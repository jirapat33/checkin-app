<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คอินฝึกงาน ปวส.2/1</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Prompt', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 32px 28px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .header { text-align: center; margin-bottom: 24px; }
        .header h2 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .header p { color: rgba(255,255,255,0.5); font-size: 13px; line-height: 1.5; }
        .badge {
            display: inline-block;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            font-size: 16px;
            color: #fff;
            font-family: 'Prompt', sans-serif;
            text-align: center;
        }
        input::placeholder { color: rgba(255,255,255,0.35); }
        input:focus { outline: none; border-color: #00d2ff; }
        .camera-wrap {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            background: #000;
            aspect-ratio: 4/3;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
        .camera-overlay {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(0,210,255,0.4);
            border-radius: 16px;
            pointer-events: none;
        }
        canvas { display: none; }
        button {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,210,255,0.35); }
        button:disabled { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); cursor: not-allowed; }
        #status { margin-top: 16px; font-size: 13px; line-height: 1.7; text-align: center; min-height: 40px; }
        .loading { color: #ffc107; }
        .success { color: #4cff91; }
        .error { color: #ff6b6b; }
        .ready { color: #00d2ff; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="badge">ปวส.2/1</div>
        <h2>📸 ระบบเช็คอินฝึกงาน</h2>
        <p>กรอกรหัสนักศึกษา แล้วกดถ่ายรูปเพื่อบันทึกเวลาและพิกัด</p>
    </div>

    <input type="text" id="studentId" placeholder="รหัสนักศึกษา 10 หลัก" inputmode="numeric">

    <div class="camera-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="camera-overlay"></div>
    </div>
    <canvas id="canvas"></canvas>

    <button id="btnCheckIn" disabled>ถ่ายรูป & เช็คอินตอนนี้</button>
    <div id="status"><span class="loading">🎥 กำลังเปิดกล้อง...</span></div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVUO6TsTD9QfBVStgb0Z-4AS0--LXufErxAiG2GgoW5I6SyouBtylzoroKK7Wce2HK/exec";

    const video  = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const btn    = document.getElementById('btnCheckIn');
    const status = document.getElementById('status');
    let stream   = null;

    async function startCamera() {
        const tries = [
            { video: { facingMode: "user" }, audio: false },
            { video: { facingMode: { ideal: "user" } }, audio: false },
            { video: true, audio: false }
        ];
        for (const c of tries) {
            try {
                stream = await navigator.mediaDevices.getUserMedia(c);
                video.srcObject = stream;
                await video.play();
                status.innerHTML = "<span class='ready'>✅ พร้อมเช็คอินแล้ว</span>";
                btn.disabled = false;
                return;
            } catch (e) {
                console.warn("camera try failed:", e.name);
            }
        }
        status.innerHTML = "<span class='error'>❌ เปิดกล้องไม่ได้<br>กรุณากด 🔒 ที่ address bar → อนุญาต กล้อง → รีโหลด</span>";
    }

    startCamera();

    btn.addEventListener('click', async () => {
        const studentId = document.getElementById('studentId').value.trim();
        if (!studentId) { alert("กรุณากรอกรหัสนักศึกษาก่อน"); return; }
        if (!stream) { alert("กล้องยังไม่พร้อม"); return; }

        btn.disabled = true;
        status.innerHTML = "<span class='loading'>📸 กำลังถ่ายรูป...</span>";

        canvas.width  = video.videoWidth  || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
